<!DOCTYPE html>
<html>
<head>
  <title>WA Sender</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- 🔐 PROTEKSI LOGIN (WAJIB PALING ATAS) -->
  <script>
    if(localStorage.getItem("login") !== "true"){
      window.location.href = "login.html";
    }
  </script>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f2f2f2;
    }

    h2 {
      text-align: center;
    }

    input, textarea, button, select {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      background: #25d366;
      color: white;
      font-size: 16px;
      border: none;
    }

    button:hover {
      background: #1ebe5d;
    }

    hr {
      margin: 20px 0;
    }

    #previewImg, #previewVideo {
      margin-top: 10px;
      max-width: 100%;
      display: none;
      border-radius: 10px;
    }

    #status {
      margin-top: 10px;
      text-align: center;
      font-weight: bold;
    }

    .logout-btn {
      background: red;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<h2>Kirim WhatsApp</h2>

<!-- 🔓 LOGOUT / TEST -->
<button class="logout-btn" onclick="hapusLogin()">Logout</button>

<!-- ================= KONTAK ================= -->
<h3>📇 Kontak</h3>

<select id="kontakSelect" onchange="isiNomor()">
  <option value="">-- Pilih Kontak --</option>
</select>

<input type="text" id="namaKontak" placeholder="Nama Kontak">
<input type="text" id="nomorKontak" placeholder="628xxxx">
<button onclick="tambahKontak()">Tambah Kontak</button>

<input type="file" id="csvFile" accept=".csv">
<button onclick="importCSV()">Import CSV</button>

<button onclick="hapusKontak()">Hapus Semua Kontak</button>

<hr>

<!-- ================= KIRIM ================= -->
<input type="text" id="nomor" placeholder="628xxxx">
<textarea id="pesan" placeholder="Tulis pesan"></textarea>

<input type="file" id="file" accept="image/*,video/*">

<img id="previewImg">
<video id="previewVideo" controls></video>

<button id="btnKirim" onclick="kirim()">Kirim</button>

<div id="status"></div>

<script>

// 🔓 LOGOUT
function hapusLogin(){
  localStorage.removeItem("login");
  alert("Logout berhasil!");
  window.location.href = "login.html";
}

// ================= CONFIG =================
const CLOUD_NAME = "dkisbfx29";
const UPLOAD_PRESET = "ml_default";
const TOKEN = ""; // isi token kamu

// ================= KONTAK =================
let kontak = JSON.parse(localStorage.getItem("kontak")) || [];

function renderKontak() {
  const select = document.getElementById("kontakSelect");
  select.innerHTML = `<option value="">-- Pilih Kontak --</option>`;

  kontak.forEach((k, i) => {
    select.innerHTML += `<option value="${i}">${k.nama} (${k.nomor})</option>`;
  });
}

function tambahKontak() {
  let nama = document.getElementById("namaKontak").value.trim();
  let nomor = document.getElementById("nomorKontak").value.trim();

  if (!nama || !nomor) {
    alert("Isi nama dan nomor!");
    return;
  }

  kontak.push({ nama, nomor });
  localStorage.setItem("kontak", JSON.stringify(kontak));

  document.getElementById("namaKontak").value = "";
  document.getElementById("nomorKontak").value = "";

  renderKontak();
}

function isiNomor() {
  let index = document.getElementById("kontakSelect").value;
  if (index !== "") {
    document.getElementById("nomor").value = kontak[index].nomor;
  }
}

function hapusKontak() {
  if (confirm("Hapus semua kontak?")) {
    localStorage.removeItem("kontak");
    kontak = [];
    renderKontak();
  }
}

// ================= IMPORT CSV =================
function importCSV() {
  const file = document.getElementById("csvFile").files[0];
  if (!file) {
    alert("Pilih file CSV dulu!");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e) {
    const text = e.target.result;
    const rows = text.split("\n");

    rows.forEach((row, index) => {
      if (index === 0) return;

      let [nama, nomor] = row.split(",");

      if (nama && nomor) {
        kontak.push({
          nama: nama.trim(),
          nomor: nomor.trim()
        });
      }
    });

    localStorage.setItem("kontak", JSON.stringify(kontak));
    renderKontak();

    alert("Import CSV berhasil!");
  };

  reader.readAsText(file);
}

// ================= PREVIEW =================
const fileInput = document.getElementById("file");
const previewImg = document.getElementById("previewImg");
const previewVideo = document.getElementById("previewVideo");

fileInput.addEventListener("change", function() {
  const file = this.files[0];
  if (!file) return;

  const url = URL.createObjectURL(file);

  if (file.type.startsWith("image")) {
    previewImg.src = url;
    previewImg.style.display = "block";
    previewVideo.style.display = "none";
  } else if (file.type.startsWith("video")) {
    previewVideo.src = url;
    previewVideo.style.display = "block";
    previewImg.style.display = "none";
  }
});

// ================= KIRIM =================
async function kirim() {
  let nomor = document.getElementById("nomor").value.trim();
  let pesan = document.getElementById("pesan").value.trim();
  let file = fileInput.files[0];
  let status = document.getElementById("status");
  let btn = document.getElementById("btnKirim");

  if (!nomor.startsWith("62")) {
    alert("Nomor harus diawali 62");
    return;
  }

  btn.disabled = true;
  btn.innerText = "Mengirim...";
  status.innerText = "⏳ Upload...";

  let mediaUrl = "";
  let uploadSuccess = false;

  try {
    // ================= UPLOAD =================
    if (file) {
      let formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", UPLOAD_PRESET);

      let upload = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, {
        method: "POST",
        body: formData
      });

      let result = await upload.json();

      if (result.secure_url) {
        mediaUrl = result.secure_url;
        uploadSuccess = true;
      } else {
        console.warn("Upload gagal:", result);
      }
    }

    status.innerText = "📤 Kirim WA...";

    let body = {
      target: nomor,
      message: pesan
    };

    // ================= KIRIM MEDIA =================
    if (uploadSuccess) {
  body.url = mediaUrl;
  body.filename = file.name;

  // 🔥 TAMBAHAN PENTING
  body.message = pesan + "\n\n" + mediaUrl;
}

    let res = await fetch("https://api.fonnte.com/send", {
      method: "POST",
      headers: {
        "Authorization": "hMYEWfgYSGSw6KK81TN6",
        "Content-Type": "application/json"
      },
      body: JSON.stringify(body)
    });

    let data = await res.json();
    console.log("Fonnte:", data);

    // ================= FALLBACK =================
    if ((!data.status || !uploadSuccess) && mediaUrl) {
      console.warn("Media gagal, kirim ulang sebagai URL");

      await fetch("https://api.fonnte.com/send", {
        method: "POST",
        headers: {
          "Authorization": "hMYEWfgYSGSw6KK81TN6",
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          target: nomor,
          message: pesan + "\n\n" + mediaUrl
        })
      });

      status.innerText = "⚠️ Media gagal, dikirim sebagai link";
      alert("Media gagal, tapi link berhasil dikirim!");
      return;
    }

    status.innerText = "✅ Berhasil!";
    alert("Pesan berhasil dikirim!");

  } catch (err) {
    console.error(err);

    // fallback kalau error total
    if (mediaUrl) {
      await fetch("https://api.fonnte.com/send", {
        method: "POST",
        headers: {
          "Authorization": "hMYEWfgYSGSw6KK81TN6",
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          target: nomor,
          message: pesan + "\n\n" + mediaUrl
        })
      });

      status.innerText = "⚠️ Error, link dikirim";
      alert("Error kirim media, tapi link dikirim!");
    } else {
      status.innerText = "❌ Gagal!";
      alert("Gagal kirim!");
    }
  }

  btn.disabled = false;
  btn.innerText = "Kirim";
}

// load kontak saat buka
renderKontak();
</script>

</body>
</html>
