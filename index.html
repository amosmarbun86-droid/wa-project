<!DOCTYPE html>
<html>
<head>
  <title>WA Sender</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f2f2f2;
    }

    input, textarea, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: green;
      color: white;
      font-size: 16px;
    }
  </style>
</head>

<body>

<h2>Kirim WhatsApp</h2>

<input type="text" id="nomor" placeholder="628xxxx">
<textarea id="pesan" placeholder="Tulis pesan"></textarea>

<button onclick="kirim()">Kirim</button>

<script>
function kirim() {
  let nomor = document.getElementById("nomor").value;
  let pesan = document.getElementById("pesan").value;

  fetch("https://api.fonnte.com/send", {
    method: "POST",
    headers: {
      "Authorization": "hMYEWfgYSGSw6KK81TN6",
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      target: nomor,
      message: pesan
    })
  })
  .then(res => res.json())
  .then(data => {
    alert("Pesan berhasil dikirim!");
  })
  .catch(err => {
    alert("Gagal kirim!");
  });
}
</script>

</body>
</html>
