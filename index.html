<!DOCTYPE html>
<html>
<head>
  <title>WA Sender Pro FINAL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
body { margin:0; font-family: Arial; }

/* ===== WA LAYOUT ===== */
.wa-app { display:flex; height:100vh; }

/* SIDEBAR */
.wa-left {
  width:30%;
  background:#075e54;
  color:white;
  display:flex;
  flex-direction:column;
}

.wa-left-header {
  padding:15px;
  font-weight:bold;
  border-bottom:1px solid #0b7d6e;
}

.contact {
  padding:12px;
  cursor:pointer;
  border-bottom:1px solid #0b7d6e;
}

.contact:hover { background:#128c7e; }
.contact.active { background:#25d366; color:black; }

/* CHAT */
.wa-right {
  width:70%;
  display:flex;
  flex-direction:column;
  background:#e5ddd5;
}

.wa-header {
  background:#075e54;
  color:white;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

.wa-chat {
  flex:1;
  padding:10px;
  overflow-y:auto;
}

.msg {
  max-width:70%;
  padding:10px;
  border-radius:10px;
  margin:5px;
}

.sent { background:#dcf8c6; margin-left:auto; }

/* INPUT */
.wa-input {
  display:flex;
  padding:10px;
  background:#f0f0f0;
}

.wa-input input[type="text"] {
  flex:1;
  padding:10px;
  margin:0 5px;
}

.wa-input button {
  background:#25d366;
  border:none;
  color:white;
  padding:10px 15px;
}
  </style>
</head>

<body>

<!-- ================= UI LAMA (TETAP ADA / BACKEND) ================= -->
<div id="oldUI" style="display:none;">

<h2>Kirim WhatsApp</h2>

<select id="kontakSelect" onchange="isiNomor()"></select>

<input type="text" id="namaKontak">
<input type="text" id="nomorKontak">
<button onclick="tambahKontak()">Tambah</button>

<input type="file" id="csvFile">
<button onclick="importCSV()">Import</button>

<input type="text" id="nomor">
<textarea id="pesan"></textarea>

<input type="file" id="file">

<button id="btnKirim" onclick="kirim()">Kirim</button>

<div id="status"></div>

</div>

<!-- ================= WA UI ================= -->
<div class="wa-app">

  <div class="wa-left">
    <div class="wa-left-header">📇 Kontak</div>
    <div id="contactList"></div>
  </div>

  <div class="wa-right">

    <div class="wa-header">
      <span id="chatName">Pilih Kontak</span>
      <div>
        <button onclick="chatWA()">💬</button>
        <button onclick="telp()">📞</button>
      </div>
    </div>

    <div id="chatBox" class="wa-chat"></div>

    <div class="wa-input">
      <input type="text" id="pesanUI" placeholder="Ketik pesan...">
      <button onclick="sendMessage()">➤</button>
    </div>

  </div>
</div>

<script>
// ================= CONFIG =================
const CLOUD_NAME="dkisbfx29";
const UPLOAD_PRESET="ml_default";

// ================= KONTAK (LAMA TETAP DIPAKAI) =================
let kontak = JSON.parse(localStorage.getItem("kontak")) || [];

// ===== RENDER SIDEBAR =====
function renderKontakSidebar(){
  let list=document.getElementById("contactList");
  list.innerHTML="";

  kontak.forEach((k,i)=>{
    list.innerHTML+=`
      <div class="contact" onclick="selectContact('${k.nomor}','${k.nama}',this)">
        ${k.nama}
      </div>`;
  });
}

// ===== SELECT CONTACT =====
let currentNomor="";

function selectContact(nomor,nama,el){
  currentNomor=nomor;
  document.getElementById("chatName").innerText=nama;
  document.getElementById("nomor").value=nomor;

  document.querySelectorAll(".contact").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");
}

// ===== SYNC KONTAK LAMA =====
function syncKontak(){
  localStorage.setItem("kontak",JSON.stringify(kontak));
  renderKontakSidebar();
}

// ===== TAMBAH KONTAK =====
function tambahKontak(){
  let nama=document.getElementById("namaKontak").value;
  let nomor=document.getElementById("nomorKontak").value;

  kontak.push({nama,nomor});
  syncKontak();
}

// ===== IMPORT CSV =====
function importCSV(){
  let file=document.getElementById("csvFile").files[0];
  let reader=new FileReader();

  reader.onload=function(e){
    let rows=e.target.result.split("\n");

    rows.forEach((r,i)=>{
      if(i===0) return;
      let [nama,nomor]=r.split(",");

      if(nama && nomor){
        kontak.push({nama:nama.trim(),nomor:nomor.trim()});
      }
    });

    syncKontak();
  };

  reader.readAsText(file);
}

// ===== KIRIM UI =====
async function sendMessage(){
  let pesan=document.getElementById("pesanUI").value;

  if(!currentNomor) return alert("Pilih kontak dulu!");

  let bubble=document.createElement("div");
  bubble.className="msg sent";
  bubble.innerText=pesan+" ⏳";

  document.getElementById("chatBox").appendChild(bubble);

  document.getElementById("pesan").value=pesan;

  try{
    await kirim();
    bubble.innerText=pesan+" ✓";
  }catch{
    bubble.innerText=pesan+" ❌";
  }

  document.getElementById("pesanUI").value="";
}

// ===== KIRIM (FONNTE + CLOUDINARY ASLI KAMU) =====
async function kirim(){
  let nomor=document.getElementById("nomor").value;
  let pesan=document.getElementById("pesan").value;
  let file=document.getElementById("file").files[0];

  let mediaUrl="";

  if(file){
    let fd=new FormData();
    fd.append("file",file);
    fd.append("upload_preset",UPLOAD_PRESET);

    let up=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`,{
      method:"POST",
      body:fd
    });

    let res=await up.json();
    mediaUrl=res.secure_url;
  }

  await fetch("https://api.fonnte.com/send",{
    method:"POST",
    headers:{
      "Authorization":"hMYEWfgYSGSw6KK81TN6",
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      target:nomor,
      message:pesan+(mediaUrl?`\n\n${mediaUrl}`:""),
      url:mediaUrl||undefined
    })
  });
}

// ===== UTIL =====
function chatWA(){
  if(currentNomor) window.open("https://wa.me/"+currentNomor);
}

function telp(){
  if(currentNomor) window.open("tel:"+currentNomor);
}

// ===== INIT =====
renderKontakSidebar();
</script>

</body>
</html>
