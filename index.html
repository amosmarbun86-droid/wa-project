<!DOCTYPE html>
<html>
<head>
  <title>WA Sender</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    /* ===== RESET ===== */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
}

/* ===== CONTAINER ===== */
.wa-app {
  display: flex;
  height: 100vh;
}

/* ===== SIDEBAR ===== */
.wa-left {
  width: 30%;
  background: #075e54;
  color: white;
  display: flex;
  flex-direction: column;
}

.wa-left-header {
  padding: 15px;
  font-size: 18px;
  font-weight: bold;
  border-bottom: 1px solid #0b7d6e;
}

.contact {
  padding: 12px;
  cursor: pointer;
  border-bottom: 1px solid #0b7d6e;
  transition: 0.2s;
}

.contact:hover {
  background: #128c7e;
}

.contact.active {
  background: #25d366;
  color: black;
  font-weight: bold;
}

/* ===== CHAT AREA ===== */
.wa-right {
  width: 70%;
  display: flex;
  flex-direction: column;
  background: #e5ddd5;
}

/* ===== HEADER ===== */
.wa-header {
  background: #075e54;
  color: white;
  padding: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.wa-header button {
  background: transparent;
  border: none;
  font-size: 18px;
  margin-left: 5px;
  cursor: pointer;
  color: white;
}

/* ===== CHAT BOX ===== */
.wa-chat {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

/* ===== BUBBLE ===== */
.msg {
  max-width: 70%;
  padding: 10px;
  border-radius: 10px;
  margin: 5px;
  word-wrap: break-word;
  animation: fadeIn 0.2s ease;
}

.sent {
  background: #dcf8c6;
  margin-left: auto;
}

.received {
  background: white;
  margin-right: auto;
}

/* ===== STATUS ===== */
.msg small {
  display: block;
  font-size: 10px;
  color: gray;
  margin-top: 5px;
  text-align: right;
}

/* ===== MEDIA ===== */
.msg img,
.msg video {
  max-width: 180px;
  border-radius: 10px;
  margin-top: 5px;
}

/* ===== INPUT ===== */
.wa-input {
  display: flex;
  padding: 10px;
  background: #f0f0f0;
  align-items: center;
}

.wa-input input[type="file"] {
  width: 80px;
}

.wa-input input[type="text"] {
  flex: 1;
  padding: 10px;
  margin: 0 5px;
  border-radius: 20px;
  border: 1px solid #ccc;
}

.wa-input button {
  padding: 10px 15px;
  background: #25d366;
  border: none;
  border-radius: 50%;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

/* ===== SCROLL ===== */
.wa-chat::-webkit-scrollbar {
  width: 5px;
}

.wa-chat::-webkit-scrollbar-thumb {
  background: #ccc;
  border-radius: 10px;
}

/* ===== ANIMATION ===== */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(5px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ===== RESPONSIVE (HP) ===== */
@media (max-width: 768px) {
  .wa-left {
    width: 40%;
  }

  .wa-right {
    width: 60%;
  }

  .msg {
    max-width: 90%;
  }
}
  </style>
</head>

<body>

<!-- ================= FORM LAMA (DISEMBUNYIKAN, JANGAN HAPUS) ================= -->
<div style="display:none;">

  <h2>Kirim WhatsApp</h2>

  <!-- KONTAK -->
  <select id="kontakSelect" onchange="isiNomor()">
    <option value="">-- Pilih Kontak --</option>
  </select>

  <input type="text" id="namaKontak" placeholder="Nama Kontak">
  <input type="text" id="nomorKontak" placeholder="628xxxx">
  <button onclick="tambahKontak()">Tambah Kontak</button>

  <input type="file" id="csvFile" accept=".csv">
  <button onclick="importCSV()">Import CSV</button>

  <button onclick="hapusKontak()">Hapus Semua Kontak</button>

  <!-- SYSTEM KIRIM -->
  <input type="text" id="nomor">
  <textarea id="pesan"></textarea>

  <input type="file" id="fileInput">

  <button id="btnKirim" onclick="kirim()">Kirim</button>

  <div id="status"></div>

</div>


<!-- ================= UI WHATSAPP (TAMPIL) ================= -->
<div class="wa-app">

  <!-- SIDEBAR -->
  <div class="wa-left">
    <div class="wa-left-header">WhatsApp</div>

    <div class="contact active" onclick="selectContact('628xxxx','Amos')">
      Amos
    </div>

    <div class="contact" onclick="selectContact('628xxxx','Budi')">
      Budi
    </div>
  </div>


  <!-- CHAT AREA -->
  <div class="wa-right">

    <!-- HEADER -->
    <div class="wa-header">
      <span id="chatName">Pilih Kontak</span>

      <div>
        <button onclick="chatWA()">💬</button>
        <button onclick="telp()">📞</button>
      </div>
    </div>

    <!-- CHAT -->
    <div id="chatBox" class="wa-chat"></div>

    <!-- INPUT -->
    <div class="wa-input">

      <!-- FILE (UI, beda ID biar tidak bentrok) -->
      <input type="file" id="fileUI" accept="image/*,video/*">

      <!-- PESAN (UI, beda ID) -->
      <input type="text" id="pesanUI" placeholder="Ketik pesan...">

      <button onclick="sendMessage()">➤</button>
    </div>

  </div>
</div>
<script>

  // ================= CONFIG =================
const CLOUD_NAME = "dkisbfx29";
const UPLOAD_PRESET = "ml_default";
const TOKEN = ""; // isi token kamu

// ================= KONTAK =================
let kontak = JSON.parse(localStorage.getItem("kontak")) || [];

function renderKontak() {
  const select = document.getElementById("kontakSelect");
  select.innerHTML = `<option value="">-- Pilih Kontak --</option>`;

  kontak.forEach((k, i) => {
    select.innerHTML += `<option value="${i}">${k.nama} (${k.nomor})</option>`;
  });
}

function tambahKontak() {
  let nama = document.getElementById("namaKontak").value.trim();
  let nomor = document.getElementById("nomorKontak").value.trim();

  if (!nama || !nomor) {
    alert("Isi nama dan nomor!");
    return;
  }

  kontak.push({ nama, nomor });
  localStorage.setItem("kontak", JSON.stringify(kontak));

  document.getElementById("namaKontak").value = "";
  document.getElementById("nomorKontak").value = "";

  renderKontak();
}

function isiNomor() {
  let index = document.getElementById("kontakSelect").value;
  if (index !== "") {
    document.getElementById("nomor").value = kontak[index].nomor;
  }
}

function hapusKontak() {
  if (confirm("Hapus semua kontak?")) {
    localStorage.removeItem("kontak");
    kontak = [];
    renderKontak();
  }
}

// ================= IMPORT CSV =================
function importCSV() {
  const file = document.getElementById("csvFile").files[0];
  if (!file) {
    alert("Pilih file CSV dulu!");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e) {
    const text = e.target.result;
    const rows = text.split("\n");

    rows.forEach((row, index) => {
      if (index === 0) return;

      let [nama, nomor] = row.split(",");

      if (nama && nomor) {
        kontak.push({
          nama: nama.trim(),
          nomor: nomor.trim()
        });
      }
    });

    localStorage.setItem("kontak", JSON.stringify(kontak));
    renderKontak();

    alert("Import CSV berhasil!");
  };

  reader.readAsText(file);
}

// ================= PREVIEW =================
const fileInput = document.getElementById("file");
const previewImg = document.getElementById("previewImg");
const previewVideo = document.getElementById("previewVideo");

fileInput.addEventListener("change", function() {
  const file = this.files[0];
  if (!file) return;

  const url = URL.createObjectURL(file);

  if (file.type.startsWith("image")) {
    previewImg.src = url;
    previewImg.style.display = "block";
    previewVideo.style.display = "none";
  } else if (file.type.startsWith("video")) {
    previewVideo.src = url;
    previewVideo.style.display = "block";
    previewImg.style.display = "none";
  }
});

// ================= KIRIM =================
async function kirim() {
  let nomor = document.getElementById("nomor").value.trim();
  let pesan = document.getElementById("pesan").value.trim();
  let file = fileInput.files[0];
  let status = document.getElementById("status");
  let btn = document.getElementById("btnKirim");

  if (!nomor.startsWith("62")) {
    alert("Nomor harus diawali 62");
    return;
  }

  btn.disabled = true;
  btn.innerText = "Mengirim...";
  status.innerText = "⏳ Upload...";

  let mediaUrl = "";
  let uploadSuccess = false;

  try {
    // ================= UPLOAD =================
    if (file) {
      let formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", UPLOAD_PRESET);

      let upload = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, {
        method: "POST",
        body: formData
      });

      let result = await upload.json();

      if (result.secure_url) {
        mediaUrl = result.secure_url;
        uploadSuccess = true;
      } else {
        console.warn("Upload gagal:", result);
      }
    }

    status.innerText = "📤 Kirim WA...";

    let body = {
      target: nomor,
      message: pesan
    };

    // ================= KIRIM MEDIA =================
    if (uploadSuccess) {
  body.url = mediaUrl;
  body.filename = file.name;

  // 🔥 TAMBAHAN PENTING
  body.message = pesan + "\n\n" + mediaUrl;
}

    let res = await fetch("https://api.fonnte.com/send", {
      method: "POST",
      headers: {
        "Authorization": "hMYEWfgYSGSw6KK81TN6",
        "Content-Type": "application/json"
      },
      body: JSON.stringify(body)
    });

    let data = await res.json();
    console.log("Fonnte:", data);

    // ================= FALLBACK =================
    if ((!data.status || !uploadSuccess) && mediaUrl) {
      console.warn("Media gagal, kirim ulang sebagai URL");

      await fetch("https://api.fonnte.com/send", {
        method: "POST",
        headers: {
          "Authorization": "hMYEWfgYSGSw6KK81TN6",
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          target: nomor,
          message: pesan + "\n\n" + mediaUrl
        })
      });

      status.innerText = "⚠️ Media gagal, dikirim sebagai link";
      alert("Media gagal, tapi link berhasil dikirim!");
      return;
    }

    status.innerText = "✅ Berhasil!";
    alert("Pesan berhasil dikirim!");

  } catch (err) {
    console.error(err);

    // fallback kalau error total
    if (mediaUrl) {
      await fetch("https://api.fonnte.com/send", {
        method: "POST",
        headers: {
          "Authorization": "hMYEWfgYSGSw6KK81TN6",
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          target: nomor,
          message: pesan + "\n\n" + mediaUrl
        })
      });

      status.innerText = "⚠️ Error, link dikirim";
      alert("Error kirim media, tapi link dikirim!");
    } else {
      status.innerText = "❌ Gagal!";
      alert("Gagal kirim!");
    }
  }

  btn.disabled = false;
  btn.innerText = "Kirim";
}
// ================= STEP 2 (TAMBAHKAN DI SINI) =================
let currentNomor = "";

function selectContact(nomor, nama) {
  currentNomor = nomor;

  document.getElementById("chatName").innerText = nama;
  document.getElementById("nomor").value = nomor;

  document.querySelectorAll(".contact").forEach(c => c.classList.remove("active"));
  event.target.classList.add("active");
}

async function sendMessage() {
  let pesanUI = document.getElementById("pesanUI").value.trim();
  let fileUI = document.getElementById("fileUI").files[0];

  if (!currentNomor) {
    alert("Pilih kontak dulu!");
    return;
  }

  let bubble = document.createElement("div");
  bubble.className = "msg sent";

  let isi = "";

  if (pesanUI) {
    isi += `<div>${pesanUI}</div>`;
  }

  if (fileUI) {
    let previewURL = URL.createObjectURL(fileUI);

    if (fileUI.type.startsWith("image")) {
      isi += `<img src="${previewURL}" style="max-width:150px;border-radius:10px;">`;
    } else if (fileUI.type.startsWith("video")) {
      isi += `<video src="${previewURL}" controls style="max-width:150px;"></video>`;
    }
  }

  isi += `<div style="font-size:10px;color:gray;">⏳ sending...</div>`;
  bubble.innerHTML = isi;

  document.getElementById("chatBox").appendChild(bubble);

  document.getElementById("pesan").value = pesanUI;

  if (fileUI) {
    let dt = new DataTransfer();
    dt.items.add(fileUI);
    document.getElementById("fileInput").files = dt.files;
  }

  try {
    await kirim();
    bubble.innerHTML = isi.replace("⏳ sending...", "✓ terkirim");
  } catch {
    bubble.innerHTML = isi.replace("⏳ sending...", "❌ gagal");
  }

  document.getElementById("pesanUI").value = "";
  document.getElementById("fileUI").value = "";
  }
// load kontak saat buka
renderKontak();
</script>

</body>
</html>
